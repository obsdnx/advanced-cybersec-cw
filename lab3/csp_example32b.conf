# =============================================================================
# Lab 3 — XSS and CSP
# Task: Apache Virtual Host configurations for CSP lab scenarios
# Description:
#   Five virtual hosts demonstrating different CSP postures.
#   example32a — no CSP header (baseline: all inline scripts execute freely)
#   example32b — static CSP with nonce + allowed external domains
#   example32c — dynamic nonce CSP generated per-request via PHP
#   example60   — hosts an external JavaScript file used by the CSP tests
#   example70   — additional JS hosting virtual host
# =============================================================================

# -----------------------------------------------------------------------------
# example32a.com — NO Content Security Policy (baseline)
# -----------------------------------------------------------------------------
# All scripts (inline and external) execute without restriction.
# Serves as the control: demonstrates XSS works when there is no CSP.

<VirtualHost *:80>
    ServerName  www.example32a.com
    DocumentRoot /var/www/csp

    # No Content-Security-Policy header — browsers apply no script restrictions.
    # Inline <script> tags, javascript: URLs, and remote scripts all execute.

    DirectoryIndex index.html
</VirtualHost>

# -----------------------------------------------------------------------------
# example32b.com — Static CSP with nonce and domain allowlist
# -----------------------------------------------------------------------------
# The CSP header is configured statically in Apache (same nonce every time).
# Allowed sources:
#   self              — scripts served from www.example32b.com itself
#   nonce-111-111-111 — only inline scripts bearing this exact nonce attribute
#   www.example60.com — a specific trusted external domain
#
# NOTE: A static nonce is insecure in production because an attacker who can
# read page source learns the nonce and can use it in an injected script.
# It is used here for simplicity; example32c shows the secure dynamic approach.

<VirtualHost *:80>
    ServerName  www.example32b.com
    DocumentRoot /var/www/csp

    # Static CSP header — same nonce on every response
    Header set Content-Security-Policy \
        "script-src 'self' 'nonce-111-111-111' www.example60.com"
    # Explanation of directives:
    #   script-src        — controls which scripts may execute
    #   'self'            — scripts from the same origin are allowed
    #   'nonce-111-111-111' — inline <script nonce="111-111-111"> tags are allowed
    #   www.example60.com — scripts loaded from this host are allowed
    # Any other inline script or external domain is BLOCKED.

    DirectoryIndex index.html
</VirtualHost>

# -----------------------------------------------------------------------------
# example32c.com — Dynamic nonce CSP via PHP (secure approach)
# -----------------------------------------------------------------------------
# A fresh cryptographically random nonce is generated for each HTTP response.
# The PHP script embeds the nonce both in the CSP header and in the script
# tags it renders, so legitimate scripts pass the browser check while any
# injected script (lacking the current nonce) is blocked.

<VirtualHost *:80>
    ServerName  www.example32c.com
    DocumentRoot /var/www/csp

    # PHP is enabled so index.php can generate a per-request nonce.
    # The CSP header is set from within the PHP script, not here in Apache:
    #
    #   $nonce = base64_encode(random_bytes(16));
    #   header("Content-Security-Policy: script-src 'self' 'nonce-$nonce'");
    #   echo "<script nonce=\"$nonce\"> ... </script>";
    #
    # Apache only needs to serve PHP files; the application sets the policy.

    DirectoryIndex index.php

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>
</VirtualHost>

# -----------------------------------------------------------------------------
# example60.com — External JavaScript hosting (trusted by example32b's CSP)
# -----------------------------------------------------------------------------
# This virtual host serves JavaScript files that example32b trusts.
# It demonstrates that CSP domain allowlisting grants implicit trust to
# ALL scripts on that domain — if an attacker can upload a file to
# www.example60.com they bypass example32b's CSP entirely.

<VirtualHost *:80>
    ServerName  www.example60.com
    DocumentRoot /var/www/js60

    DirectoryIndex index.html

    # Serve JS files with the correct MIME type
    AddType application/javascript .js
</VirtualHost>

# -----------------------------------------------------------------------------
# example70.com — Additional external JavaScript hosting virtual host
# -----------------------------------------------------------------------------
# Demonstrates a second external JS host; could be added to the CSP allowlist
# in further exercises to explore how each addition expands the attack surface.

<VirtualHost *:80>
    ServerName  www.example70.com
    DocumentRoot /var/www/js70

    DirectoryIndex index.html

    AddType application/javascript .js
</VirtualHost>
